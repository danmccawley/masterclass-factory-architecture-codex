<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Curriculum Planner · Masterclass Factory</title>
<style>
  :root{
    /* Light is the default skin, matching the rest of the tool (styles.css). */
    --bg:#fbf8f0; --bg2:#fffdf7; --ink:#22302f; --dim:#5c6864; --faint:#8a948f;
    --amber:#c4a06b; --teal:#1d9fc2; --line:rgba(34,48,47,0.14); --card:#fffdf7; --card2:#f4efe4;
    --primary:#0b6387; --primary-ink:#ffffff; --primary-hover:#1d9fc2; --warn:#9a5c45; --good:#2e7d52;
    --serif:"Fraunces",Georgia,serif; --sans:"IBM Plex Sans",system-ui,sans-serif; --mono:"IBM Plex Mono",monospace;
  }
  /* Opt-in dark skin (the page's original palette). Applied only when chosen. */
  html[data-theme="dark"]{
    --bg:#070809; --bg2:#0c0f14; --ink:#eef2f7; --dim:#8b96a6; --faint:#4a5360;
    --amber:#e6a042; --teal:#46c8c0; --line:#1c232e; --card:#10141b; --card2:#151a23;
    --primary:#e6a042; --primary-ink:#1a1206; --primary-hover:#ffc977; --warn:#e6b86a; --good:#5fc98a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;}
  .wrap{max-width:960px;margin:0 auto;padding:32px 20px 80px;}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);}
  h1{font-family:var(--serif);font-size:40px;margin:6px 0 6px;line-height:1.05;}
  .sub{color:var(--dim);max-width:60ch;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-top:22px;}
  label{display:block;font-size:13px;color:var(--dim);margin:12px 0 5px;font-family:var(--mono);letter-spacing:.04em;}
  input,textarea,select{width:100%;background:var(--bg2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:11px 12px;font:inherit;}
  textarea{min-height:64px;resize:vertical;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .row3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;}
  button{font:inherit;cursor:pointer;border:0;border-radius:9px;}
  button:disabled{cursor:default;opacity:.55;}
  .primary{background:var(--primary);color:var(--primary-ink);font-weight:700;padding:13px 22px;letter-spacing:.02em;margin-top:18px;}
  .primary:hover:not(:disabled){background:var(--primary-hover);}
  .ghost{background:transparent;color:var(--primary);border:1px solid var(--primary);padding:8px 14px;font-size:13px;}
  .status{margin-top:14px;color:var(--dim);font-family:var(--mono);font-size:13px;min-height:18px;}
  .status .warn{color:var(--warn);}
  .arc{color:var(--dim);font-style:italic;margin:6px 0 14px;}
  .class-card{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:12px 0;}
  .class-card h3{margin:0 0 4px;font-family:var(--serif);font-size:21px;}
  .class-num{font-family:var(--mono);color:var(--amber);font-size:13px;margin-bottom:6px;}
  .class-sum{color:var(--dim);margin:2px 0 10px;}
  .obj-h{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:10px 0 3px;}
  .obj-h.t{color:var(--teal);}
  ul{margin:2px 0 6px;padding-left:18px;}
  li{margin:2px 0;}
  .meta{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .hint{color:var(--faint);font-size:12px;}
  .count-pill{font-family:var(--mono);font-size:12px;color:var(--amber);border:1px solid var(--line);border-radius:999px;padding:3px 10px;}
  /* Canvas: editable fields + prerequisites + coherence + status */
  .c-title{font-family:var(--serif);font-size:20px;font-weight:600;margin-bottom:6px;}
  .c-sum{min-height:46px;margin-bottom:4px;}
  .c-min{width:72px !important;display:inline-block !important;padding:5px 8px !important;}
  .prereqs{display:flex;flex-wrap:wrap;gap:8px 16px;margin:4px 0 4px;}
  .chk{display:inline-flex;align-items:center;gap:6px;font-family:var(--sans);font-size:13px;color:var(--ink);margin:0;}
  .chk input{width:auto;}
  .setup{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin:16px 0;}
  .setup>summary{cursor:pointer;font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);}
  .setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px 14px;margin:12px 0 6px;}
  .setup-grid label{margin:0 0 4px;}
  .kb-owner{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
  .kb-opt{display:flex;flex-direction:column;gap:3px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;cursor:pointer;font-size:13px;color:var(--ink);margin:0;font-family:var(--sans);text-transform:none;letter-spacing:0;}
  .kb-opt small{color:var(--dim);font-size:11px;}
  .kb-opt input{width:auto;margin-right:6px;}
  .kb-opt:has(input:checked){border-color:var(--teal);box-shadow:0 0 0 1px var(--teal) inset;}
  @media(max-width:640px){.kb-owner{grid-template-columns:1fr;}}
  .biblio{margin-top:18px;border-top:1px solid var(--line);padding-top:14px;}
  .biblio-head{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;}
  .src{display:flex;gap:8px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .src:last-child{border-bottom:none;}
  .src .tier{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:1px 7px;border-radius:999px;border:1px solid var(--line);color:var(--dim);white-space:nowrap;}
  .src .tier.primary{color:var(--good);border-color:var(--good);}
  .src .tier.secondary{color:var(--teal);border-color:var(--teal);}
  .src .body{flex:1;min-width:0;}
  .src .ttl{color:var(--ink);text-decoration:none;border-bottom:1px solid transparent;word-break:break-word;}
  .src .ttl:hover{border-bottom-color:var(--teal);}
  .src .meta2{color:var(--faint);font-size:11px;font-family:var(--mono);margin-top:2px;}
  .badge{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--dim);}
  .badge[data-state="built"]{color:var(--good);border-color:var(--good);}
  .badge[data-state="building"]{color:var(--teal);border-color:var(--teal);}
  .badge[data-state="failed"]{color:var(--warn);border-color:var(--warn);}
  .coh{margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}
  .coh-head{font-family:var(--mono);font-size:13px;margin-bottom:8px;}
  .coh-head .ok{color:var(--good);} .coh-head .err{color:var(--warn);} .coh-head .warnc{color:var(--amber);}
  .findings{list-style:none;padding:0;margin:0;}
  .findings li{padding:8px 10px;border-radius:8px;margin:6px 0;font-size:14px;border:1px solid var(--line);}
  .findings .f-error{border-color:var(--warn);background:rgba(154,92,69,0.08);}
  .findings .f-warning{border-color:var(--amber);background:rgba(196,160,107,0.10);}
  .f-tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-right:8px;color:var(--faint);}
  .f-error .f-tag{color:var(--warn);} .f-warning .f-tag{color:var(--amber);}
  .intent-note{font-size:13px;color:var(--amber);font-family:var(--mono);margin-top:10px;}
  /* Build loop */
  .build{margin-top:18px;border-top:1px solid var(--line);padding-top:14px;}
  .build-head{font-family:var(--mono);font-size:13px;margin-bottom:10px;}
  .build-rows{margin:8px 0;}
  .brow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .brow:last-child{border-bottom:0;}
  .brow .bt{flex:1;min-width:160px;}
  .brow .cu{font-size:13px;color:var(--primary);text-decoration:none;}
  .brow .cu:hover{text-decoration:underline;}
  .brow .mini{font-size:12px;padding:5px 11px;}
  .spin{display:inline-block;width:11px;height:11px;border:2px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-1px;margin-right:5px;}
  .brow-progress{flex-basis:100%;display:flex;align-items:center;gap:10px;margin:2px 0;}
  .brow-bar{flex:1;height:6px;background:var(--card2);border:1px solid var(--line);border-radius:999px;overflow:hidden;}
  .brow-bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--amber));transition:width .45s ease;}
  .brow-meta{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap;}
  .bstatus{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin:10px 0;font-size:13px;}
  .bstatus .dot{width:9px;height:9px;border-radius:50%;flex:none;background:var(--dim);}
  .bstatus .bmsg{flex:1;line-height:1.5;}
  .bstatus .bact{flex:none;}
  .bstatus[data-phase="working"]{border-color:var(--teal);}
  .bstatus[data-phase="working"] .dot{background:var(--teal);animation:bpulse 1.1s ease-in-out infinite;}
  .bstatus[data-phase="waiting"]{border-color:var(--amber);background:rgba(196,160,107,0.10);}
  .bstatus[data-phase="waiting"] .dot{background:var(--amber);animation:bpulse 1.1s ease-in-out infinite;}
  .bstatus[data-phase="done"]{border-color:var(--good);}
  .bstatus[data-phase="done"] .dot{background:var(--good);}
  .bstatus[data-phase="stopped"] .dot{background:var(--dim);}
  .bstatus[data-phase="stuck"]{border-color:var(--warn);background:rgba(154,92,69,0.08);}
  .bstatus[data-phase="stuck"] .dot{background:var(--warn);}
  @keyframes bpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}
  .brow.flagged{animation:rowpulse 1.5s ease-in-out infinite;border-radius:8px;}
  @keyframes rowpulse{0%,100%{background:transparent;}50%{background:rgba(196,160,107,0.16);}}
  @keyframes sp{to{transform:rotate(360deg);}}
  /* Planner live indicator: the planner is a single long LLM call with no progress
     stream, so this is an honest animated estimate — spinner + staged caption +
     asymptotic bar + elapsed clock. Motion = alive; a still screen must never
     read as working. Mirrors the per-class build ticker. */
  .plan-live{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--card2);}
  .plan-live-head{display:flex;align-items:center;font-family:var(--mono);font-size:13px;color:var(--ink);}
  .plan-live-bar{height:4px;background:var(--line);border-radius:3px;margin:10px 0 6px;overflow:hidden;}
  .plan-live-bar > i{display:block;height:100%;width:0;background:var(--teal);transition:width .3s linear;}
  .plan-live-meta{font-family:var(--mono);font-size:12px;color:var(--dim);}
  @media (max-width:760px){
    .row,.row3{grid-template-columns:1fr;}
    h1{font-size:30px;}
    .wrap{padding:22px 16px 64px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Masterclass Factory</div>
  <h1>Curriculum Planner</h1>
  <p class="sub">Describe a subject and Bernard proposes a sequenced syllabus — an ordered set of right-sized classes you can review, edit, and check for coherence before building.</p>
  <div class="intent-note" id="intentNote"></div>

  <div class="panel">
    <label for="subject">Subject</label>
    <input id="subject" placeholder="e.g. The Texas War of Independence, Intro to Organic Chemistry, Personal Finance for new grads" />
    <div class="row3">
      <div><label for="audience">Audience</label><input id="audience" placeholder="e.g. high-school students" /></div>
      <div><label for="level">Level</label>
        <select id="level"><option>introductory</option><option>intermediate</option><option>advanced</option><option>mixed</option></select></div>
      <div><label for="count">How many classes</label>
        <select id="count"><option value="">Let Bernard decide</option><option>5</option><option>6</option><option>8</option><option>10</option><option>12</option><option>15</option></select></div>
    </div>
    <label for="scope">Scope, emphasis, or constraints <span class="hint">(optional)</span></label>
    <textarea id="scope" placeholder="e.g. focus on causes and consequences, skip military tactics, align to a specific standard…"></textarea>
    <button class="primary" id="go">Plan the curriculum</button>
    <div class="status" id="status"></div>
  </div>

  <div id="result"></div>
</div>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  function esc(s){ var d=document.createElement("div"); d.textContent=(s==null?"":String(s)); return d.innerHTML; }
  function setStatus(msg, warn){ $("status").innerHTML = warn ? "<span class='warn'>"+esc(msg)+"</span>" : esc(msg); }

  // ---- Planner live indicator -------------------------------------------
  // The plan is one long LLM request that streams no progress, so this is an
  // honest client-side estimate: an elapsed clock, an asymptotic bar that never
  // claims completion until the response lands, and a caption that advances on
  // typical planning timing. Same language as the per-class build ticker.
  var planTick = { id:null, start:0 };
  var PLAN_STAGES = [
    [0,  "Reading the subject \u0026 scope"],
    [4,  "Researching the domain"],
    [11, "Proposing the class sequence"],
    [22, "Setting objectives \u0026 prerequisites"],
    [34, "Checking the arc for coherence"],
    [46, "Finalizing the syllabus"]
  ];
  function startPlanTick(){
    stopPlanTick();
    $("status").innerHTML =
      "<div class='plan-live'>"+
        "<div class='plan-live-head'><span class='spin'></span><span class='plan-stage'>"+esc(PLAN_STAGES[0][1])+"</span></div>"+
        "<div class='plan-live-bar'><i></i></div>"+
        "<div class='plan-live-meta'><span class='plan-clock'>0:00</span> elapsed \u00b7 Bernard is designing the syllabus\u2026</div>"+
      "</div>";
    planTick.start = Date.now();
    planTick.id = setInterval(paintPlanTick, 300);
    paintPlanTick();
  }
  function paintPlanTick(){
    var wrap = $("status").querySelector(".plan-live"); if(!wrap) return;
    var secs = Math.floor((Date.now()-planTick.start)/1000);
    var pct = Math.min(95, 100*(1-Math.exp(-secs/22)));
    var stage = PLAN_STAGES[0][1];
    for(var i=0;i<PLAN_STAGES.length;i++){ if(secs>=PLAN_STAGES[i][0]) stage=PLAN_STAGES[i][1]; }
    var st=wrap.querySelector(".plan-stage"); if(st) st.textContent=stage;
    var bar=wrap.querySelector(".plan-live-bar > i"); if(bar) bar.style.width=pct.toFixed(1)+"%";
    var ck=wrap.querySelector(".plan-clock"); if(ck) ck.textContent=mmss(secs);
  }
  function stopPlanTick(){ if(planTick.id){ clearInterval(planTick.id); planTick.id=null; } }

  // Mirror api/curriculum-store.js slugify so client-side prerequisite links
  // line up with the slugs the server assigns on save.
  function slugify(t){
    return String(t==null?"":t).toLowerCase().replace(/['"]/g,"").replace(/[^a-z0-9]+/g,"-")
      .replace(/^-+|-+$/g,"").replace(/\.+/g,"").slice(0,80) || "class";
  }

  var state = { plan:null, input:null, manifest:null };

  // Front-door intent: "full" (plan + build) is what this page does today.
  // "series" implies ingesting an existing curriculum — not built yet.
  var intent = (new URLSearchParams(location.search)).get("intent") || "full";
  if(intent === "series"){
    $("intentNote").textContent = "Bringing an existing curriculum to support isn't wired up yet — for now, plan one here and build its classes.";
  }

  function liList(items){
    if(!items || !items.length) return "<p class='hint'>—</p>";
    return "<ul>" + items.map(function(x){ return "<li>"+esc(x)+"</li>"; }).join("") + "</ul>";
  }

  function classCard(c, i, all){
    var prereqBoxes = all.map(function(o, j){
      if(j === i) return "";
      var checked = (c.prerequisites||[]).indexOf(slugify(o.title)) >= 0 ? " checked" : "";
      return "<label class='chk'><input type='checkbox' class='prereq' value='"+j+"'"+checked+" /> "+esc(o.title)+"</label>";
    }).join("");
    var html = "<div class='class-card' data-index='"+i+"'>";
    html += "<div class='class-num'>Class "+(i+1)+"</div>";
    html += "<input class='c-title' value='"+esc(c.title)+"' />";
    html += "<textarea class='c-sum' placeholder='Short summary'>"+esc(c.summary||"")+"</textarea>";
    html += "<div class='obj-h t'>Terminal objectives</div>"+liList(c.objectives.terminal);
    html += "<div class='obj-h'>Enabling objectives</div>"+liList(c.objectives.enabling);
    html += "<div class='obj-h'>Prerequisites <span class='hint'>(earlier classes this one builds on)</span></div>";
    html += prereqBoxes ? "<div class='prereqs'>"+prereqBoxes+"</div>" : "<p class='hint'>No other classes to depend on yet.</p>";
    html += "<div class='meta'>~ <input class='c-min' type='number' min='5' max='240' value='"+(c.suggested_minutes||50)+"' /> min";
    html += " · <span class='badge' data-state='planned'>planned</span></div>";
    html += "</div>";
    return html;
  }

  function renderCanvas(plan, input){
    state.plan = plan; state.input = input;
    var html = "<div class='panel'>";
    html += "<div class='toolbar'><span class='count-pill'>"+plan.classes.length+" classes</span>";
    html += "<span class='hint'>"+esc(plan.subject)+" · "+esc(plan.level)+"</span></div>";
    if(plan.notes) html += "<p class='arc'>"+esc(plan.notes)+"</p>";
    html += "<label for='programOutcome'>Program outcome <span class='hint'>(what the whole curriculum builds toward — checked against the class objectives)</span></label>";
    html += "<textarea id='programOutcome' placeholder='By the end, learners can…'>"+esc(plan.notes||"")+"</textarea>";
    html += "<details class='setup' open><summary>Class setup \u2014 applies to every class</summary>";
    html += "<div class='setup-grid'>";
    html += "<label>Class tier<select id='setupTier'><option value='briefing'>Briefing</option><option value='standard' selected>Standard</option><option value='professional'>Professional</option><option value='expert'>Expert</option></select></label>";
    html += "<label>Technical level<select id='setupTech'><option value='non'>Non-technical</option><option value='mixed' selected>Mixed</option><option value='technical'>Technical</option></select></label>";
    html += "<label>Tone<select id='setupTone'><option value='plain' selected>Plain</option><option value='warm'>Warm</option><option value='executive'>Executive</option><option value='academic'>Academic</option><option value='workshop'>Workshop</option></select></label>";
    html += "<label>Reading grade cap<input id='setupReading' type='number' min='3' max='16' value='9' /></label>";
    html += "<label>Education <span class='hint'>(optional)</span><input id='setupEdu' type='text' placeholder='e.g. undergraduate' /></label>";
    html += "<label>Audience role <span class='hint'>(optional)</span><input id='setupRole' type='text' placeholder='e.g. new hires' /></label>";
    html += "</div>";
    html += "<div class='obj-h'>Knowledge base \u2014 who assembles each class\u2019s sources</div>";
    html += "<div class='kb-owner'>";
    html += "<label class='kb-opt'><span><input type='radio' name='setupOwner' value='ai' checked /><strong>Bernard builds it</strong></span><small>AI researches &amp; verifies sources \u00b7 recommended for accuracy</small></label>";
    html += "<label class='kb-opt'><span><input type='radio' name='setupOwner' value='assisted' /><strong>You + Bernard</strong></span><small>You add the sources below, Bernard fills the gaps</small></label>";
    html += "<label class='kb-opt'><span><input type='radio' name='setupOwner' value='creator' /><strong>You build it</strong></span><small>Build only on the sources you add below \u2014 no auto-research</small></label>";
    html += "</div>";
    html += "<div id='sourcesWrap' style='display:none;margin-top:12px'>";
    html += "<label for='setupSources'>Your sources <span class='hint'>(one per line \u2014 a URL, or \u201cTitle | https://\u2026\u201d)</span></label>";
    html += "<textarea id='setupSources' placeholder='https://example.org/standard\nKey report | https://example.org/report'></textarea>";
    html += "</div>";
    html += "</details>";
    html += "<div id='cards'>";
    plan.classes.forEach(function(c, i){ html += classCard(c, i, plan.classes); });
    html += "</div>";
    html += "<div class='toolbar' style='margin-top:16px'>";
    html += "<button class='primary' id='saveCur' style='margin-top:0'>Save &amp; check coherence</button>";
    html += "<button class='ghost' id='copyPlan'>Copy as JSON</button>";
    html += "</div>";
    html += "<div id='coherence'></div>";
    html += "<div id='build'></div>";
    html += "<div id='biblio'></div>";
    html += "</div>";
    $("result").innerHTML = html;

    var save = $("saveCur"); if(save) save.addEventListener("click", saveCurriculum);
    var sw = $("sourcesWrap");
    function syncSources(){
      var o = document.querySelector("input[name=setupOwner]:checked");
      var show = o && (o.value === "creator" || o.value === "assisted");
      if(sw) sw.style.display = show ? "block" : "none";
    }
    Array.prototype.forEach.call(document.querySelectorAll("input[name=setupOwner]"), function(r){ r.addEventListener("change", syncSources); });
    syncSources();
    var copy = $("copyPlan"); if(copy) copy.addEventListener("click", function(){
      try { navigator.clipboard.writeText(JSON.stringify(buildManifest(), null, 2)); setStatus("Copied to clipboard."); }
      catch(e){ setStatus("Couldn't copy — your browser blocked clipboard access.", true); }
    });
  }

  function buildManifest(){
    var cards = Array.prototype.slice.call(document.querySelectorAll(".class-card"));
    var titles = cards.map(function(card){ return (card.querySelector(".c-title").value || "").trim(); });
    var classes = cards.map(function(card, i){
      var prereqIdx = Array.prototype.slice.call(card.querySelectorAll(".prereq:checked")).map(function(cb){ return Number(cb.value); });
      var prereqSlugs = prereqIdx.map(function(idx){ return slugify(titles[idx]); });
      return {
        title: titles[i],
        summary: card.querySelector(".c-sum").value,
        terminal: state.plan.classes[i].objectives.terminal,
        enabling: state.plan.classes[i].objectives.enabling,
        prerequisites: prereqSlugs,
        suggested_minutes: Number(card.querySelector(".c-min").value) || 50,
        order: i + 1
      };
    });
    function fv(id, dflt){ var el = $(id); return (el && el.value != null && el.value !== "") ? el.value : dflt; }
    var ownerEl = document.querySelector("input[name=setupOwner]:checked");
    return {
      title: state.input.subject,
      subject: state.input.subject,
      audience: state.input.audience,
      level: state.input.level,
      program_outcome: ($("programOutcome").value || "").trim(),
      setup: {
        tier: fv("setupTier", "standard"),
        research_owner: ownerEl ? ownerEl.value : "ai",
        sources: (function(){
          var raw = fv("setupSources", "");
          if(!raw) return [];
          return raw.split("\n").map(function(line){
            line = line.trim(); if(!line) return null;
            var bar = line.indexOf("|");
            if(bar >= 0) return { title: line.slice(0, bar).trim(), url: line.slice(bar+1).trim() };
            return { url: line };
          }).filter(function(s){ return s && s.url; });
        })(),
        audience: {
          education: fv("setupEdu", ""),
          technical: fv("setupTech", "mixed"),
          role: fv("setupRole", ""),
          tone: fv("setupTone", "plain"),
          reading_grade_cap: Number(fv("setupReading", 9)) || 9
        }
      },
      classes: classes
    };
  }

  function renderCoherence(coh){
    if(!coh){ $("coherence").innerHTML = ""; return; }
    var s = coh.summary;
    var head = coh.ok
      ? "<span class='ok'>structurally sound</span>"
      : "<span class='err'>"+s.errors+" issue"+(s.errors===1?"":"s")+" to fix</span>";
    if(s.warnings) head += " · <span class='warnc'>"+s.warnings+" note"+(s.warnings===1?"":"s")+"</span>";
    var html = "<div class='coh'><div class='coh-head'>Coherence: "+head+"</div>";
    if(coh.findings && coh.findings.length){
      var rank = { error:0, warning:1, info:2 };
      var sorted = coh.findings.slice().sort(function(a,b){ return rank[a.severity]-rank[b.severity]; });
      html += "<ul class='findings'>";
      sorted.forEach(function(f){
        html += "<li class='f-"+f.severity+"'><span class='f-tag'>"+f.severity+"</span>"+esc(f.message)+"</li>";
      });
      html += "</ul>";
    } else {
      html += "<p class='hint'>No issues found — prerequisites resolve, no cycles, objectives cover the outcome.</p>";
    }
    html += "</div>";
    $("coherence").innerHTML = html;
  }

  function saveCurriculum(){
    var manifest = buildManifest();
    var btn = $("saveCur"); btn.disabled = true; var label = btn.textContent; btn.textContent = "Saving…";
    setStatus("Saving curriculum and checking coherence…");
    fetch("/api/curriculum-build", {
      method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ action:"save", manifest:manifest, input:state.input })
    })
      .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
      .then(function(res){
        if(res.ok && res.j && res.j.ok){
          state.manifest = res.j.manifest;
          setStatus("Saved as \u201C"+res.j.manifest.slug+"\u201D. Coherence checked below.");
          renderCoherence(res.j.coherence);
          renderBuild(res.j.manifest, res.j.coherence);
          renderBibliography(res.j);
        } else {
          var err = (res.j && res.j.errors && res.j.errors.join("; ")) || (res.j && res.j.error) || "save failed";
          setStatus("Save: "+err, true);
        }
      })
      .catch(function(){ setStatus("Couldn't reach the curriculum service.", true); })
      .finally(function(){ btn.disabled = false; btn.textContent = label; });
  }

  // ---- Build loop -------------------------------------------------------
  var building = false;
  // Resilience: each class gets a few automatic attempts before it ever
  // escalates to the human, and a single failure never dead-ends the whole
  // build — Bernard presses on and surfaces stragglers at the end.
  var MAX_RETRIES = 2;        // 3 attempts total per class
  var attempts = {};          // slug -> attempts so far this run
  var failures = [];          // { slug, msg } collected this run

  // Parallel scheduler: build several independent classes at once, capped, in
  // dependency order. The cap matters — each /api/generate is already several
  // concurrent provider calls (parallel authoring + glossary + assessment), so
  // a small pool protects provider rate limits, spend, and GitHub-commit churn
  // while still cutting wall-clock. The prereq graph's critical path gates the
  // real ceiling anyway. 3 is a sane default (later a UI control).
  var CONCURRENCY = 3;
  var inFlight = {};          // slug -> true: a worker owns this class right now
  var paused = {};            // slug -> true: awaiting the human's review decision
  var failedSet = {};         // slug -> true: exhausted attempts THIS run; don't re-pick
                              // (readyBuildable re-offers failed classes for retry, so
                              //  without this the pool would re-pick a straggler forever
                              //  and the end-of-run escalation could never be reached)

  function renderBuild(manifest, coh){
    var rows = manifest.classes.map(function(c){
      return "<div class='brow' data-slug='"+esc(c.slug)+"'>"+
        "<span class='badge' data-state='"+esc(c.status)+"'>"+esc(c.status)+"</span>"+
        "<span class='bt'>"+esc(c.title)+"</span>"+
        (c.class_url?("<a class='cu' href='"+esc(c.class_url)+"' target='_blank' rel='noopener'>view \u2192</a>"):"")+
      "</div>";
    }).join("");
    var html = "<div class='build'><div class='build-head'>Build classes <span class='hint'>\u00B7 in dependency order, several at once</span></div>";
    html += "<div class='build-rows' id='buildRows'>"+rows+"</div>";
    html = html.replace("<div class='build-rows'", "<div class='bstatus' id='buildStatus' data-phase='' style='display:none'><span class='dot'></span><span class='bmsg'></span></div><div class='build-rows'");
    if(coh.ok){
      html += "<button class='primary' id='buildAll' style='margin-top:8px'>Build all classes</button>";
    } else {
      html += "<p class='hint'>Fix the issue(s) above before building \u2014 structure and prerequisites must be sound first.</p>";
    }
    html += "<div class='status' id='buildNote'></div></div>";
    $("build").innerHTML = html;
    var ba = $("buildAll"); if(ba) ba.addEventListener("click", function(){ buildAll(manifest.slug); });
  }

  function rowFor(slug){ return document.querySelector(".brow[data-slug=\""+slug+"\"]"); }

  // Live per-class readiness ticker. /api/generate is one long request with no
  // progress signal, so this is an honest client-side estimate — an elapsed
  // clock, an asymptotic creep that never claims completion until the response
  // lands, and a stage caption that advances on typical build timing.
  // Multiple classes can build at once now, so the ticker tracks a START time
  // per slug and a single shared interval paints every live row's bar + clock.
  var ticks = {};            // slug -> { start }
  var tickTimer = null;
  var BUILD_STAGES = [
    [0,   "Checking the brief"],
    [5,   "Researching \u0026 verifying sources"],
    [40,  "Designing the deck"],
    [75,  "Writing \u0026 grounding the slides"],
    [140, "Finalizing \u0026 publishing"]
  ];
  function mmss(s){ var m=Math.floor(s/60), r=s%60; return m+":"+(r<10?"0":"")+r; }
  function stopTick(){ ticks = {}; if(tickTimer){ clearInterval(tickTimer); tickTimer=null; } }
  function stopTickFor(slug){
    if(ticks[slug]) delete ticks[slug];
    if(Object.keys(ticks).length===0 && tickTimer){ clearInterval(tickTimer); tickTimer=null; }
  }
  function startTick(slug){
    if(ticks[slug]) return;            // already ticking this row
    ticks[slug] = { start: Date.now() };
    if(!tickTimer) tickTimer = setInterval(paintTicks, 300);
    paintTicks();
  }
  function paintTicks(){
    Object.keys(ticks).forEach(function(slug){
      var row=rowFor(slug); if(!row) return;
      var secs=Math.floor((Date.now()-ticks[slug].start)/1000);
      var pct=Math.min(96, 100*(1-Math.exp(-secs/75)));
      var stage=BUILD_STAGES[0][1];
      for(var i=0;i<BUILD_STAGES.length;i++){ if(secs>=BUILD_STAGES[i][0]) stage=BUILD_STAGES[i][1]; }
      var bar=row.querySelector(".brow-bar > i"); if(bar) bar.style.width=pct.toFixed(1)+"%";
      var meta=row.querySelector(".brow-meta"); if(meta) meta.textContent=stage+" \u00b7 "+mmss(secs);
    });
  }

  // The shared knowledge core, made visible: every source Bernard verified while
  // building, deduped across classes, with who cites it. Refreshes as classes build.
  function renderBibliography(v){
    var box = $("biblio"); if(!box) return;
    var sources = (v && v.bibliography) || [];
    var sum = (v && v.bibliography_summary) || { total:0, primary:0, secondary:0, unknown:0 };
    if(!sources.length){
      box.innerHTML = "<div class='biblio'><div class='biblio-head'>Curriculum bibliography</div><p class='hint'>Sources appear here as Bernard builds each class.</p></div>";
      return;
    }
    var titleBySlug = {};
    if(v.manifest && v.manifest.classes) v.manifest.classes.forEach(function(c){ titleBySlug[c.slug] = c.title; });
    var rows = sources.map(function(s){
      var tier = s.primary ? "primary" : (s.trust==="secondary" ? "secondary" : "unverified");
      var cites = (s.cited_by||[]).map(function(sl){ return titleBySlug[sl] || sl; });
      var meta = [s.published, cites.length ? ("cited by "+cites.join(", ")) : ""].filter(Boolean).join(" \u00b7 ");
      var ttl = s.path
        ? "<a class='ttl' href='"+esc(s.path)+"' target='_blank' rel='noopener'>"+esc(s.title||s.path)+"</a>"
        : esc(s.title||"");
      return "<div class='src'><span class='tier "+(tier==="unverified"?"":tier)+"'>"+tier+"</span>"+
        "<span class='body'>"+ttl+(meta?("<div class='meta2'>"+esc(meta)+"</div>"):"")+"</span></div>";
    }).join("");
    var head = "Curriculum bibliography \u00b7 "+sum.total+" source"+(sum.total===1?"":"s")+
      " ("+sum.primary+" primary, "+sum.secondary+" secondary"+(sum.unknown?(", "+sum.unknown+" unverified"):"")+")";
    box.innerHTML = "<div class='biblio'><div class='biblio-head'>"+esc(head)+"</div>"+rows+"</div>";
  }

  function setRow(slug, st, opts){
    opts = opts || {};
    var row = rowFor(slug); if(!row) return;
    var badge = row.querySelector(".badge");
    badge.setAttribute("data-state", (st==="review"?"failed":st));
    badge.innerHTML = st==="building" ? "<span class='spin'></span>building" : (st==="review" ? "needs review" : esc(st));
    Array.prototype.slice.call(row.querySelectorAll(".mini,.cu.added")).forEach(function(e){ e.remove(); });
    if(st==="building"){
      startTick(slug);
      if(!row.querySelector(".brow-progress")){
        var pg=document.createElement("div"); pg.className="brow-progress";
        pg.innerHTML="<span class='brow-bar'><i></i></span><span class='brow-meta'></span>";
        row.appendChild(pg);
      }
    } else {
      stopTickFor(slug);
      var ex=row.querySelector(".brow-progress"); if(ex) ex.remove();
    }
    if(st==="built" && opts.url){
      var a=document.createElement("a"); a.className="cu added"; a.href=opts.url; a.target="_blank"; a.rel="noopener"; a.textContent="view \u2192"; row.appendChild(a);
    }
    if(st==="review"){
      var go=document.createElement("button"); go.className="ghost mini"; go.textContent="Build anyway"; go.onclick=opts.onProceed; row.appendChild(go);
      var stop=document.createElement("button"); stop.className="ghost mini"; stop.textContent="Stop"; stop.onclick=opts.onStop; row.appendChild(stop);
    }
    if(st==="failed" && opts.onRetry){
      var rt=document.createElement("button"); rt.className="ghost mini"; rt.textContent="Retry"; rt.onclick=opts.onRetry; row.appendChild(rt);
    }
  }

  function getView(slug){
    return fetch("/api/curriculum-build?slug="+encodeURIComponent(slug), {cache:"no-store"})
      .then(function(r){ return r.json(); }).catch(function(){ return null; });
  }
  function postStatus(curSlug, classSlug, st, url, sources){
    return fetch("/api/curriculum-build", {method:"POST",headers:{"content-type":"application/json"},
      body: JSON.stringify({ action:"status", slug:curSlug, class:classSlug, status:st, class_url:url||"", sources:(sources||[]) })})
      .then(function(r){ return r.json(); }).catch(function(){ return null; });
  }
  function generateClass(brief, force){
    var b = JSON.parse(JSON.stringify(brief));
    try { var prov = window.localStorage ? window.localStorage.getItem("mf-provider") : ""; if(prov){ b.engine = { provider: prov, model: "" }; } } catch(e){}
    var body = { brief: b, publish: true };
    // Optional bring-your-own key, scoped to the chosen provider; sent out-of-band,
    // never placed on the brief. Absent => server env key, as before.
    try { var pk = (b.engine && b.engine.provider) || ""; var ak = (pk && window.sessionStorage) ? sessionStorage.getItem("mf-api-key:"+pk) : ""; if(ak) body.api_key = ak; } catch(e){}
    if(force){ body.proceed_anyway = true; body.accept_quality = true; }
    return fetch("/api/generate", {method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)})
      .then(function(r){ return r.json().then(function(j){ return j; }); })
      .then(function(j){
        j = j || {};
        if(j.status==="published" || j.status==="not_configured") return { kind:"built", url:j.expected_url||"", sources:(j.knowledge_base_sources||[]) };
        if(j.resolution) return { kind:"review", msg:(j.message || j.resolution) };
        return { kind:"error", msg:(j.errors?j.errors.join("; "):(j.error||"generation failed")) };
      })
      .catch(function(){ return { kind:"error", msg:"couldn't reach the generator (it may have timed out)" }; });
  }

  function finishBuild(msg, warn){
    building = false;
    stopTick();
    flagRow(null);
    setBuildButton("Build remaining classes", false);
    setPhase(warn ? "stopped" : "done", esc(msg||""));
    if(msg) $("buildNote").innerHTML = warn ? ("<span class='warn'>"+esc(msg)+"</span>") : esc(msg);
  }

  // Genuine edge case: a class exhausted its automatic attempts. Everything that
  // could build, did. Tell the human exactly what's left and what went wrong,
  // and offer one click to try the stragglers again — never a silent dead-end.
  function escalateFailures(slug, v){
    building = false;
    stopTick();
    setBuildButton("Build remaining classes", false);
    var built = (v && v.progress) ? v.progress.built : null;
    var total = (v && v.progress) ? v.progress.total : null;
    var last = failures[failures.length-1];
    var msg = "Bernard built everything it could"+(built!=null?(" ("+built+" of "+total+")"):"")+". "+
      failures.length+" class"+(failures.length===1?"":"es")+" couldn't finish after "+(MAX_RETRIES+1)+" attempts each"+
      (last && last.msg ? (" \u2014 last issue: "+last.msg) : "")+".";
    flagRow(failures[0] ? failures[0].slug : null);
    setPhase("stuck", esc(msg), { label:"Try the "+failures.length+" again", fn:function(){ flagRow(null); buildAll(slug); } });
    $("buildNote").innerHTML = "";
  }

  // ---- Macro build state: Working / Waiting-for-you / Done / Stopped / Stuck.
  // Motion = alive; a still screen must never read as "working". Every state is
  // visually distinct, and anything that needs the human links straight to it.
  var slugTitles = {};
  var runStart = 0;
  var AVG_MIN = 3; // rough per-class estimate (parallel authoring + fast model); /api/generate streams no progress, so this is a guide, not a countdown
  function titleOf(slug){ return slugTitles[slug] || slug; }
  function setBuildButton(label, disabled){ var ba=$("buildAll"); if(!ba) return; ba.disabled=!!disabled; ba.textContent=label; }
  function setPhase(phase, msg, action){
    var el=$("buildStatus"); if(!el) return;
    el.style.display="flex"; el.setAttribute("data-phase", phase);
    el.querySelector(".bmsg").innerHTML = msg;
    var old=el.querySelector(".bact"); if(old) old.remove();
    if(action){ var b=document.createElement("button"); b.className="ghost mini bact"; b.textContent=action.label; b.onclick=action.fn; el.appendChild(b); }
  }
  function flagRow(slug){
    Array.prototype.forEach.call(document.querySelectorAll(".brow.flagged"), function(r){ r.classList.remove("flagged"); });
    if(slug){ var r=rowFor(slug); if(r) r.classList.add("flagged"); }
  }
  function scrollToRow(slug){ var r=rowFor(slug); if(r && r.scrollIntoView) r.scrollIntoView({behavior:"smooth", block:"center"}); }

  function parallelEstLine(progress, n){
    var built=progress.built, total=progress.total;
    var remaining=Math.max(0, total-built);
    var elapsed=runStart ? Math.floor((Date.now()-runStart)/1000) : 0;
    var estMin=Math.ceil(remaining*AVG_MIN/Math.max(1,CONCURRENCY));
    return "Building "+n+" class"+(n===1?"":"es")+" at once \u00b7 "+built+" of "+total+
      " done \u00b7 ~"+estMin+" min left (est.) \u00b7 "+mmss(elapsed)+" elapsed";
  }

  function buildAll(slug){
    if(building) return;
    building = true;
    attempts = {}; failures = []; inFlight = {}; paused = {}; failedSet = {};
    runStart = Date.now();
    setBuildButton("Building\u2026", true);
    setPhase("working", "Starting the build \u2014 up to "+CONCURRENCY+" classes at once, in dependency order.");
    $("buildNote").textContent = "";
    pump(slug);
  }

  function countInFlight(){ return Object.keys(inFlight).length; }

  // The scheduler heartbeat: read curriculum state, paint it, then fill every
  // free worker slot from the server's ready[] (all currently-buildable classes,
  // dependency-correct), skipping ones already in flight, paused for review, or
  // failed this run. Re-invoked after every worker finishes, so newly-unblocked
  // classes get picked up the moment their prerequisites land.
  function pump(slug){
    if(!building) return;
    getView(slug).then(function(v){
      if(!v || !v.ok){
        // Don't tear down while workers are still running — they'll re-pump and
        // recover. Only hard-stop the read error if nothing is in flight.
        if(countInFlight()===0){
          building=false; stopTick();
          setBuildButton("Build remaining classes", false);
          setPhase("stuck", "Couldn't read the curriculum state \u2014 the service may have hiccuped. Your built classes are safe.",
            {label:"Retry", fn:function(){ building=true; setBuildButton("Building\u2026", true); setPhase("working","Re-reading the curriculum state\u2026"); pump(slug); }});
        }
        return;
      }
      // Paint every row EXCEPT ones the client is actively driving (building /
      // paused), so a stale server status can't stomp live UI or review buttons.
      v.manifest.classes.forEach(function(c){
        slugTitles[c.slug]=c.title;
        if(c.status!=="building" && !inFlight[c.slug] && !paused[c.slug]) setRow(c.slug, c.status, {url:c.class_url});
      });
      renderBibliography(v);

      if(v.progress.done){ finishBuild("All "+v.progress.total+" classes built. \uD83C\uDF89"); return; }

      // Fill free slots. Claim each slug synchronously (before the async brief
      // fetch) so overlapping pumps can't double-pick the same class.
      var ready = (v.ready||[]).filter(function(s){ return !inFlight[s] && !paused[s] && !failedSet[s]; });
      while(countInFlight() < CONCURRENCY && ready.length){
        var cls = ready.shift();
        inFlight[cls] = true;
        launch(slug, cls);
      }

      if(countInFlight()===0){
        // Nothing running and nothing started this pass — decide the end state.
        if(Object.keys(paused).length){ return; }            // waiting on a human review
        if(failures.length){ escalateFailures(slug, v); return; }
        finishBuild("No more classes can build automatically \u2014 some are blocked by a failed prerequisite.", true);
        return;
      }
      setBuildButton("Building\u2026", true);
      setPhase("working", esc(parallelEstLine(v.progress, countInFlight())));
      $("buildNote").textContent = "";
    });
  }

  function fetchBrief(slug, classSlug){
    return fetch("/api/curriculum-build?slug="+encodeURIComponent(slug)+"&class="+encodeURIComponent(classSlug), {cache:"no-store"})
      .then(function(r){ return r.json(); })
      .then(function(j){ return (j && j.ok && j.brief) ? j.brief : null; })
      .catch(function(){ return null; });
  }

  // Start a worker: load the class's brief (per-slug, keeps the view light), then
  // build it. A brief that won't load is treated like any other stumble — a few
  // retries, then recorded as a straggler so the slot frees and the pool moves on.
  function launch(slug, classSlug){
    setRow(classSlug, "building");
    fetchBrief(slug, classSlug).then(function(brief){
      if(!brief){
        var n=(attempts[classSlug]=(attempts[classSlug]||0)+1);
        if(n<=MAX_RETRIES){ setTimeout(function(){ launch(slug, classSlug); }, 1500*n); return; }
        recordFailure(slug, classSlug, "couldn't load the class brief");
        return;
      }
      runWorker(slug, classSlug, brief, false);
    });
  }

  function recordFailure(slug, classSlug, msg){
    failures.push({ slug: classSlug, msg: msg });
    failedSet[classSlug] = true;
    delete inFlight[classSlug];
    postStatus(slug, classSlug, "failed").then(function(){ setRow(classSlug, "failed"); pump(slug); });
  }

  function runWorker(slug, classSlug, brief, force){
    generateClass(brief, force).then(function(out){
      if(out.kind==="built"){
        postStatus(slug, classSlug, "built", out.url, out.sources).then(function(){
          delete inFlight[classSlug];
          setRow(classSlug, "built", {url:out.url});
          pump(slug);                       // a completed prereq may unblock others
        });
        return;
      }
      if(out.kind==="review"){
        // Free the slot and park the class — independents keep building while the
        // human decides. This is the headline win over the old serial pause.
        delete inFlight[classSlug];
        paused[classSlug] = true;
        setRow(classSlug, "review", {
          onProceed:function(){
            delete paused[classSlug];
            inFlight[classSlug] = true;
            setRow(classSlug,"building");
            setPhase("working", "Resuming \u2014 building \u201C"+esc(titleOf(classSlug))+"\u201D on your go-ahead.");
            runWorker(slug, classSlug, brief, true);
            pump(slug);                     // also top up any other free slots
          },
          onStop:function(){
            // Abandon just THIS class (not the whole run); surface it at the end.
            delete paused[classSlug];
            recordFailure(slug, classSlug, "stopped by you at the review prompt");
          }
        });
        flagRow(classSlug);
        scrollToRow(classSlug);
        setPhase("waiting",
          "<strong>Paused \u2014 Bernard needs your decision on \u201C"+esc(titleOf(classSlug))+"\u201D.</strong> "+esc(out.msg)+
          " Use <em>Build anyway</em> or <em>Stop</em> on the highlighted row \u2014 other classes keep building.",
          {label:"Go to it \u2193", fn:function(){ scrollToRow(classSlug); }});
        pump(slug);                         // fill the slot this pause just freed
        return;
      }
      // error: almost always infra, not knowledge. Auto-retry with backoff a few
      // times (slot stays held) before recording it as a straggler.
      var n = (attempts[classSlug] = (attempts[classSlug] || 0) + 1);
      if(n <= MAX_RETRIES){
        setRow(classSlug, "building");
        setPhase("working", "\u201C"+esc(titleOf(classSlug))+"\u201D hit a snag \u2014 Bernard is retrying (attempt "+(n+1)+" of "+(MAX_RETRIES+1)+")\u2026");
        setTimeout(function(){ runWorker(slug, classSlug, brief, force); }, 1500 * n);
        return;
      }
      recordFailure(slug, classSlug, out.msg);
    });
  }

  $("go").addEventListener("click", function(){
    var subject = ($("subject").value||"").trim();
    if(!subject){ setStatus("Enter a subject first.", true); return; }
    var input = {
      subject: subject,
      audience: ($("audience").value||"").trim(),
      level: $("level").value,
      scope: ($("scope").value||"").trim(),
      count: $("count").value ? Number($("count").value) : 0
    };
    var btn = $("go"); btn.disabled = true; var label = btn.textContent; btn.textContent = "Bernard is planning\u2026";
    startPlanTick();
    $("result").innerHTML = "";
    fetch("/api/curriculum", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(input) })
      .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, j:j }; }); })
      .then(function(res){
        stopPlanTick();
        if(res.ok && res.j && res.j.ok && res.j.plan){
          setStatus("Planned "+res.j.class_count+" classes."+(res.j.cost_usd!=null?(" (~$"+res.j.cost_usd.toFixed(4)+")"):"")+" Bernard proposed the sequence and prerequisites \u2014 review, adjust if needed, then save.");
          renderCanvas(res.j.plan, input);
        } else {
          var err = (res.j && res.j.error) || "couldn't plan the curriculum";
          setStatus("Planner: "+err+(res.j && res.j.details ? (" — "+res.j.details.join("; ")) : ""), true);
        }
      })
      .catch(function(){ stopPlanTick(); setStatus("Couldn't reach the planner service.", true); })
      .finally(function(){ stopPlanTick(); btn.disabled = false; btn.textContent = label; });
  });

  $("subject").addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); $("go").click(); } });
})();
</script>
</body>
</html>
